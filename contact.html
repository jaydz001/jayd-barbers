<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Jay's Barbershop</title>

    <!-- BOOTSTRAP -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- FONT AWESOME -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

    <!-- GOOGLE FONT -->
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet">
</head>
<body>

    <!-- BOOTSTRAP NAVBAR -->
    <nav class="navbar navbar-expand-lg custom-navbar">

        <div class="container-fluid px-5">

            <a class="navbar-brand logo" href="index.html">
                Jay's Barbershop
                <i class="fas fa-pole barber-icon"></i>
            </a>

            <button class="navbar-toggler bg-warning"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarMenu">

                <span class="navbar-toggler-icon"></span>

            </button>

            <div class="collapse navbar-collapse justify-content-end" id="navbarMenu">

                <ul class="navbar-nav">

                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Home</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="about.html">About</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="services.html">Services</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="pricing.html">Pricing</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link active" href="contact.html">Contact</a>
                    </li>

                </ul>

            </div>

        </div>

    </nav>

    <!-- CONTACT SECTION -->
    <section class="contact-section">

        <div class="contact-title text-center">

            <p>GET IN TOUCH</p>

            <div class="contact-line justify-content-center">
                <span></span>
                <i class="fas fa-scissors"></i>
                <span></span>
            </div>

            <h1>CONTACT US</h1>

        </div>

        <div class="container">

            <div class="row g-4 align-items-stretch">

                <!-- CONTACT INFO -->
                <div class="col-lg-5">

                    <div class="row g-4">

                        <div class="col-12">
                            <div class="card contact-box h-100">
                                <div class="card-body d-flex align-items-center gap-4">
                                    <i class="fas fa-location-dot"></i>
                                    <div>
                                        <h3>Our Location</h3>
                                        <p>Manila, Philippines</p>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="col-12">
                            <div class="card contact-box h-100">
                                <div class="card-body d-flex align-items-center gap-4">
                                    <i class="fas fa-phone"></i>
                                    <div>
                                        <h3>Phone Number</h3>
                                        <p>09123456789</p>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="col-12">
                            <div class="card contact-box h-100">
                                <div class="card-body d-flex align-items-center gap-4">
                                    <i class="fas fa-envelope"></i>
                                    <div>
                                        <h3>Email Address</h3>
                                        <p>jaysbarbershop@gmail.com</p>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="col-12">
                            <div class="card contact-box h-100">
                                <div class="card-body d-flex align-items-center gap-4">
                                    <i class="fas fa-clock"></i>
                                    <div>
                                        <h3>Opening Hours</h3>
                                        <p>Mon - Sun: 9:00 AM - 8:00 PM</p>
                                    </div>
                                </div>
                            </div>
                        </div>

                    </div>

                </div>

                <!-- CONTACT FORM -->
                <div class="col-lg-7">

                    <form class="contact-form h-100" id="contactForm">

                        <h2>Send Message</h2>

                        <div class="mb-3">
                            <input type="text" id="name" class="form-control" placeholder="Your Name">
                        </div>

                        <div class="mb-3">
                            <input type="email" id="email" class="form-control" placeholder="Your Email">
                        </div>

                        <div class="mb-3">
                            <input type="text" id="subject" class="form-control" placeholder="Subject">
                        </div>

                        <div class="mb-3">
                            <textarea id="message" class="form-control" placeholder="Your Message"></textarea>
                        </div>

                        <button type="submit" class="btn contact-btn">
                            <i class="fas fa-paper-plane"></i>
                            SEND MESSAGE
                        </button>

                        <p id="formMessage" class="mt-3"></p>

                    </form>

                </div>

            </div>

        </div>

    </section>

    <!-- BOOTSTRAP JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- CUSTOM JS -->
    <script src="script.js"></script>

</body>
</html>
